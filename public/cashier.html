<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Terminal | Barangay Sto. Niño</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .heading-font { font-family: 'Poppins', sans-serif; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .nav-item.active { background: #0f766e; color: white; }
        
        /* ================================================= */
        /* CUSTOM ADDED CSS START */
        /* Admin Design Language & Glassmorphism */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.5); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px -5px rgba(15, 23, 42, 0.05);
        }
        .glass-panel-dark {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .view-section { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Sidebar Navigation Active State Override */
        .nav-item { transition: all 0.2s ease-in-out; }
        .nav-item.active { 
            background: rgba(13, 148, 136, 0.9) !important;
            color: white !important; 
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
            transform: translateX(4px);
        }
        /* CUSTOM ADDED CSS END */
        /* ================================================= */

        /* High Fidelity Background Photo Overlay */
        .bg-blue-photo-overlay {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 32, 67, 0.95)), url('https://static2.bigstockphoto.com/5/7/4/large1500/475603217.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Animated Linear Gradient Shift Layer */
        .animated-gradient-overlay {
            background: linear-gradient(-45deg, rgba(20, 184, 166, 0.15), rgba(99, 102, 241, 0.15), rgba(13, 148, 136, 0.2), rgba(6, 78, 59, 0.15));
            background-size: 400% 400%;
            animation: bg-slide 10s infinite ease-in-out;
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes bg-slide {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Modals and Overlays */
        #history-modal, #custom-message-box { 
            display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; 
            background:rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px); z-index:9999; 
            justify-content:center; align-items:center; 
        }

        /* CSS Hack to hide placeholder when outputArea is visible */
        #outputArea:not(.hidden) ~ #awaitingScanPlaceholder {
            display: none !important;
        }
    </style>
</head>
<body class="bg-blue-photo-overlay text-slate-800 relative">

<div class="animated-gradient-overlay"></div>

<script>

    let currentCashierName = "";
    let currentTransactionId = null;
    let cashierHistoryData = []; 

    setInterval(() => {
        let clockEl = document.getElementById('live-clock');
        if(clockEl) {
            clockEl.innerHTML = `<i class="fa-solid fa-clock text-teal-600 mr-1.5"></i> ${new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
        }
    }, 1000);

    document.addEventListener('click', () => {
        if (document.getElementById('view-scan').classList.contains('active')) {
            document.getElementById('manual-scan-input').focus();
        }
    });

    async function handleLogin() {
        const user = document.getElementById('cashier-user').value;
        const pass = document.getElementById('cashier-pass').value;
        const errorDiv = document.getElementById('error-msg');

        const response = await fetch('/api/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const result = await response.json();

        if (result.success && result.role === 'cashier') {
            currentCashierName = result.name;
            document.getElementById('logged-in-name').innerText = currentCashierName;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-layout').classList.remove('hidden');
            document.getElementById('history-date').value = new Date().toISOString().split('T')[0];
            loadHistory();
            document.getElementById('manual-scan-input').focus();
        } else {
            errorDiv.innerText = "Access Denied. Invalid Cashier Credentials.";
        }
    }
    document.getElementById('cashier-pass').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
    document.getElementById('manual-scan-input').addEventListener('keypress', e => { if (e.key === 'Enter') processScan(); });

    function logout() { location.reload(); }

    function nav(viewId) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active', 'text-white'));
        document.querySelectorAll('.nav-item').forEach(v => v.classList.add('text-slate-600'));
        
        document.getElementById(viewId).classList.add('active');
        const activeBtn = document.querySelector(`button[onclick="nav('${viewId}')"]`);
        activeBtn.classList.add('active', 'text-white');
        activeBtn.classList.remove('text-slate-600');

        document.querySelectorAll('.nav-item').forEach(v => {
            v.classList.remove('text-slate-600'); 
            if(!v.classList.contains('active')) {
                v.classList.add('text-slate-300'); 
            }
        });

        if (viewId === 'view-history') loadHistory();
        if (viewId === 'view-scan') document.getElementById('manual-scan-input').focus();
    }

    async function processScan() {
        const input = document.getElementById('manual-scan-input');
        const feedback = document.getElementById('scan-feedback');
        const qrData = input.value.trim();
        
        if (!qrData) return;
        input.value = ''; 
        feedback.innerHTML = '<span class="text-slate-500 font-medium tracking-wide"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Verifying...</span>';

        try {
            const res = await fetch('/api/cashier-scan', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scannedQR: qrData })
            });
            const result = await res.json();

            if (result.success) {
                feedback.innerHTML = '<span class="text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-100"><i class="fa-solid fa-check mr-1"></i> Match Found</span>';
                renderTransactionDetails(result.dbData);
            } else {
                feedback.innerHTML = `<span class="text-rose-600 bg-rose-50 px-3 py-1 rounded-lg border border-rose-100"><i class="fa-solid fa-triangle-exclamation mr-1"></i> ${result.message}</span>`;
                resetDetails();
            }
        } catch (e) {
            feedback.innerHTML = '<span class="text-rose-500">Server Connection Error</span>';
        }
    }

    function resetDetails() {
        currentTransactionId = null;
        document.getElementById('detail-status-badge').className = "px-4 py-1.5 rounded-full text-xs font-bold bg-slate-100 text-slate-500 border border-slate-200 uppercase tracking-wider shadow-sm";
        document.getElementById('detail-status-badge').innerText = "AWAITING SCAN";
        document.getElementById('details-container').innerHTML = `<div class="flex flex-col items-center justify-center text-slate-400 py-10"><div class="bg-slate-50 p-6 rounded-full border border-slate-100 mb-4 shadow-inner"><i class="fa-solid fa-folder-open text-6xl text-slate-300"></i></div><p class="font-medium">No transaction loaded.</p></div>`;
        document.getElementById('action-buttons').classList.add('hidden');
    }

    function renderTransactionDetails(row) {
        currentTransactionId = row.transaction_id;
        const container = document.getElementById('details-container');
        const badge = document.getElementById('detail-status-badge');
        const actions = document.getElementById('action-buttons');

        if (row.status === 'PENDING') {
            badge.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-amber-50 text-amber-600 border border-amber-200 uppercase tracking-wider shadow-sm";
            badge.innerText = "UNPAID / PENDING";
        } else if (row.status === 'COMPLETED') {
            badge.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-emerald-50 text-emerald-600 border border-emerald-200 uppercase tracking-wider shadow-sm";
            badge.innerText = "ALREADY PRINTED";
        } else {
            badge.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-blue-50 text-blue-600 border border-blue-200 uppercase tracking-wider shadow-sm";
            badge.innerText = row.status;
        }

        let parsedData = {};
        try { parsedData = JSON.parse(row.document_data); } catch(e){}

        let dataHtml = '';
        for (const [key, value] of Object.entries(parsedData)) {
            let displayVal = value;
            if (key === 'Business Scale') displayVal = `<span class="text-amber-600 font-extrabold bg-amber-50 px-2 py-0.5 rounded-md border border-amber-100">${value}</span>`;
            
            dataHtml += `
                <div class="bg-slate-50/80 border border-slate-100 p-4 rounded-2xl shadow-sm transition-all hover:bg-slate-50">
                    <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-1.5">${key}</p>
                    <p class="text-sm font-semibold text-slate-800 leading-snug">${displayVal}</p>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="w-full text-left">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-slate-100 pb-5 gap-4">
                    <div>
                        <h4 class="text-2xl font-extrabold text-teal-800 heading-font">${row.doc_type}</h4>
                        <p class="font-mono text-xs text-slate-500 mt-1.5">ID: <span class="font-bold text-teal-600 bg-teal-50 px-2 py-0.5 rounded-md">${row.transaction_id}</span> | SRC: <span class="font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded-md">${row.source || 'UNKNOWN'}</span></p>
                    </div>
                    <div class="text-left sm:text-right bg-slate-50 px-5 py-3 rounded-2xl border border-slate-100 shadow-sm min-w-[200px]">
                        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest mb-1">Applicant Name</p>
                        <p class="text-lg font-bold text-slate-900 truncate">${row.user_name}</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${dataHtml}
                </div>
            </div>
        `;

        actions.innerHTML = '';
        actions.classList.remove('hidden');

        if (row.status === 'PENDING') {
            actions.innerHTML = `
                <button onclick="takeAction('AUTHORIZE')" class="flex-grow bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-check-double text-lg"></i> Payment Received (Print)</button>
                <button onclick="takeAction('DENY')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-4 px-8 rounded-2xl transition-all border border-rose-200 flex items-center justify-center gap-2 shrink-0"><i class="fa-solid fa-xmark text-lg"></i> Deny</button>
            `;
        } else if (row.status === 'COMPLETED') {
            actions.innerHTML = `
                <div class="flex-grow text-sm text-slate-500 font-medium flex items-center bg-white border border-slate-200 px-4 py-3 rounded-2xl"><i class="fa-solid fa-circle-info text-blue-500 mr-3 text-lg"></i> This document has already been issued.</div>
                <button onclick="takeAction('REPRINT')" class="bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-amber-500/20 transition-all flex items-center justify-center gap-2 shrink-0"><i class="fa-solid fa-print text-lg"></i> Auth Reprint</button>
            `;
        } else {
            actions.innerHTML = `<div class="w-full text-center text-sm font-bold text-blue-600 bg-blue-50 py-4 rounded-2xl border border-blue-100 flex items-center justify-center gap-2"><i class="fa-solid fa-spinner fa-spin text-lg"></i> Transaction currently processing...</div>`;
        }
    }

    async function takeAction(actionType) {
        if (!currentTransactionId) return;

        const res = await fetch('/api/cashier-action', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transactionId: currentTransactionId, action: actionType, cashierName: currentCashierName })
        });
        const result = await res.json();
        
        if (result.success) {
            document.getElementById('scan-feedback').innerHTML = `<span class="text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-100"><i class="fa-solid fa-check mr-1"></i> ${result.message}</span>`;
            resetDetails();
            document.getElementById('manual-scan-input').focus();
        } else {
            alert(result.message);
        }
    }

    function clearFilters() {
        document.getElementById('hist-search').value = "";
        document.getElementById('history-date').value = "";
        document.getElementById('filter-type').value = "";
        document.getElementById('filter-source').value = "";
        loadHistory();
    }

    async function loadHistory() {
        const dateStr = document.getElementById('history-date').value;
        const searchQuery = document.getElementById('hist-search').value;
        const docType = document.getElementById('filter-type').value;
        const source = document.getElementById('filter-source').value;

        const res = await fetch('/api/cashier-history', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                cashierName: currentCashierName, 
                dateStr: dateStr, 
                searchQuery: searchQuery,
                docType: docType,
                source: source
            })
        });
        const result = await res.json();

        const tbody = document.getElementById('history-body');
        if (result.success && result.history.length > 0) {
            cashierHistoryData = result.history; // Save for CSV export
            let html = '';
            result.history.forEach(row => {
                const timeStr = new Date(row.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let statusColor = row.status === 'COMPLETED' ? 'bg-emerald-50 text-emerald-600 border-emerald-200 shadow-sm' : 'bg-slate-50 text-slate-500 border-slate-200';
                
                let sourceBadge = '';
                if (row.source === 'KIOSK') sourceBadge = '<span class="bg-blue-50 text-blue-600 border border-blue-200 text-[10px] px-2 py-0.5 rounded-md font-extrabold mt-1.5 inline-block shadow-sm tracking-wider">KIOSK</span>';
                else if (row.source === 'REMOTE') sourceBadge = '<span class="bg-purple-50 text-purple-600 border border-purple-200 text-[10px] px-2 py-0.5 rounded-md font-extrabold mt-1.5 inline-block shadow-sm tracking-wider">WEB</span>';

                html += `
                    <tr class="hover:bg-slate-50/80 transition-colors border-b border-slate-100/80">
                        <td class="p-5 text-slate-500 font-mono text-xs">${timeStr}</td>
                        <td class="p-5 font-mono text-xs text-teal-700 font-bold"><span class="bg-teal-50 border border-teal-100 px-2 py-1 rounded-md shadow-sm">${row.transaction_id}</span></td>
                        <td class="p-5 font-bold text-slate-800">${row.user_name}</td>
                        <td class="p-5 leading-tight">
                            <span class="text-slate-700 text-xs uppercase font-extrabold block">${row.doc_type}</span>
                            ${sourceBadge}
                        </td>
                        <td class="p-5 font-bold text-xs"><span class="px-3.5 py-1.5 rounded-xl border ${statusColor}">${row.status}</span></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        } else {
            cashierHistoryData = [];
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-slate-400 font-medium bg-slate-50/50"><i class="fa-solid fa-folder-open text-3xl mb-3 text-slate-300 block"></i>No transactions found matching your criteria.</td></tr>`;
        }
    }

    function exportCashierCSV() {
        if(cashierHistoryData.length === 0) return alert("No data to export based on current filters.");
        
        const headers = ["Date", "Time", "Transaction ID", "Applicant Name", "Document Type", "Source", "Status", "Cashier"];
        let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n";

        cashierHistoryData.forEach(row => {
            const dateObj = new Date(row.created_at);
            const dateStr = dateObj.toLocaleDateString();
            const timeStr = dateObj.toLocaleTimeString();
            
            const rowData = [
                `"${dateStr}"`, `"${timeStr}"`, `"${row.transaction_id}"`, `"${row.user_name || ''}"`, 
                `"${row.doc_type}"`, `"${row.source || 'UNKNOWN'}"`, `"${row.status}"`, `"${row.cashier_name || ''}"`
            ];
            csvContent += rowData.join(",") + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `shift_report_${currentCashierName.replace(/ /g, '_')}_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
